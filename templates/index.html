<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Helmet Detection AI</title>

```
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #1e293b;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(56, 189, 248, 0.3);
        text-align: center;
        width: 400px;
    }

    h1 {
        color: #38bdf8;
        margin-bottom: 20px;
    }

    input[type="file"] {
        margin: 15px 0;
        color: #94a3b8;
    }

    button {
        background: linear-gradient(45deg, #06b6d4, #3b82f6);
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        box-shadow: 0 0 15px #38bdf8;
    }

    img {
        margin-top: 20px;
        width: 100%;
        border-radius: 10px;
        border: 2px solid #38bdf8;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #64748b;
    }
</style>
```

</head>

<body>

<div class="container">
    <h1>🚀 Helmet Detection AI</h1>

```
<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required><br>
    <button type="submit">Analyze Image</button>
</form>

{% if output %}
    <h3>Result:</h3>
    <img src="{{ url_for('static', filename=output) }}">
{% endif %}

<div class="footer">
    Powered by YOLOv8
</div>
```

</div>

</body>
</html>
